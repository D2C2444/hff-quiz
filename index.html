<!DOCTYPE html>
<html lang="en-AU">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Is it you, or is it perimenopause? | Hot, Foggy &amp; Fabulous</title>
<meta name="description" content="A 2-minute quiz for women wondering if it's them or if it's the change. Get your personalised result, plus the three things that help most right where you are.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script>
  (function(w, d, t, h, s, n) {
    w.FlodeskObject = n;
    var fn = function() { (w[n].q = w[n].q || []).push(arguments); };
    w[n] = w[n] || fn;
    var f = d.getElementsByTagName(t)[0];
    var v = '?v=' + Math.floor(new Date().getTime() / (h * 60 * 1000));
    var sm = d.createElement(t); sm.async = true; sm.type = 'module'; sm.src = s + v;
    f.parentNode.insertBefore(sm, f);
    var sn = d.createElement(t); sn.async = true; sn.noModule = true; sn.src = s.replace('.mjs', '.js') + v;
    f.parentNode.insertBefore(sn, f);
  })(window, document, 'script', 0.1, 'https://assets.flodesk.com/universal.mjs', 'fd');
</script>
<style>
  :root{
    --navy:#203D51;
    --navy-deep:#1a3243;
    --gold:#EED082;
    --gold-deep:#d9b85f;
    --arctic:#A1CAEB;
    --cream:#FBF8F2;
    --ink:#22333f;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;}
  body{
    font-family:'Montserrat',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    color:var(--ink);background:var(--navy);line-height:1.65;font-weight:400;
    -webkit-font-smoothing:antialiased;min-height:100vh;
    display:flex;align-items:center;justify-content:center;padding:24px;
  }
  h1,h2,h3,.display{font-family:'Cormorant Garamond',Georgia,serif;line-height:1.12;font-weight:600;}
  img{max-width:100%;display:block;}

  .card{
    width:100%;max-width:680px;background:var(--cream);border-radius:8px;overflow:hidden;
    box-shadow:0 40px 90px -30px rgba(10,22,32,.7);position:relative;
  }
  .topbar{background:var(--navy);text-align:center;padding:26px 24px 18px;}
  .topbar img{width:min(360px,72%);height:auto;display:inline-block;}
  .brandmark{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.15rem;color:var(--gold);letter-spacing:.02em;}
  .brandmark b{font-weight:700;font-style:normal;}

  /* progress */
  .progress{height:6px;background:rgba(32,61,81,.12);}
  .progress .bar{height:100%;width:0;background:var(--gold);transition:width .35s ease;}

  .pad{padding:44px 44px 40px;}
  .kicker{text-transform:uppercase;letter-spacing:.2em;font-size:.72rem;font-weight:600;color:var(--gold-deep);margin-bottom:14px;}

  /* intro */
  .intro h1{font-size:clamp(2rem,6vw,3rem);color:var(--navy);margin-bottom:16px;}
  .intro .hook{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.35rem;color:var(--gold-deep);margin-bottom:22px;line-height:1.35;}
  .intro p{font-size:1rem;color:var(--ink);margin-bottom:14px;}
  .meta{display:flex;gap:22px;flex-wrap:wrap;margin:26px 0 30px;}
  .meta div{display:flex;align-items:center;gap:9px;font-size:.86rem;color:var(--navy);font-weight:500;}
  .meta .dot{width:26px;height:26px;border-radius:50%;background:var(--gold);color:var(--navy);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.8rem;flex:0 0 auto;}

  /* question */
  .qcount{text-transform:uppercase;letter-spacing:.18em;font-size:.72rem;font-weight:600;color:var(--gold-deep);margin-bottom:12px;}
  .qtext{font-family:'Cormorant Garamond',serif;font-size:clamp(1.5rem,4.5vw,2.1rem);color:var(--navy);line-height:1.2;margin-bottom:26px;}
  .opts{display:flex;flex-direction:column;gap:12px;}
  .opt{
    text-align:left;background:#fff;border:1.5px solid rgba(32,61,81,.14);border-radius:5px;
    padding:16px 20px;font-family:'Montserrat',sans-serif;font-size:1rem;color:var(--ink);
    cursor:pointer;transition:.16s;display:flex;align-items:center;gap:14px;line-height:1.4;
  }
  .opt:hover{border-color:var(--gold-deep);background:#fff;transform:translateY(-1px);box-shadow:0 8px 22px -14px rgba(32,61,81,.5);}
  .opt .letter{flex:0 0 30px;height:30px;border-radius:50%;border:1.5px solid var(--gold-deep);color:var(--gold-deep);
    display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.82rem;transition:.16s;}
  .opt:hover .letter{background:var(--gold);border-color:var(--gold);color:var(--navy);}

  .navrow{display:flex;justify-content:space-between;align-items:center;margin-top:26px;}
  .back{background:none;border:none;color:var(--navy);font-family:'Montserrat',sans-serif;font-size:.82rem;
    font-weight:600;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;opacity:.6;padding:8px 4px;}
  .back:hover{opacity:1;}
  .back[disabled]{visibility:hidden;}

  /* result */
  .result .badge{display:inline-block;text-transform:uppercase;letter-spacing:.16em;font-size:.72rem;font-weight:700;
    color:var(--navy);background:var(--gold);padding:7px 16px;border-radius:2px;margin-bottom:18px;}
  .result h2{font-size:clamp(1.9rem,5.5vw,2.7rem);color:var(--navy);margin-bottom:16px;}
  .result .lead{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.3rem;color:var(--gold-deep);line-height:1.4;margin-bottom:22px;}
  .result p{font-size:1rem;margin-bottom:16px;}
  .whats{background:#fff;border-left:3px solid var(--gold);border-radius:4px;padding:20px 22px;margin:6px 0 26px;}
  .whats b{display:block;text-transform:uppercase;letter-spacing:.12em;font-size:.74rem;color:var(--navy);margin-bottom:10px;}
  .wins{list-style:none;margin:0 0 30px;}
  .wins li{display:flex;gap:13px;align-items:flex-start;padding:9px 0;font-size:.98rem;color:var(--ink);border-bottom:1px solid rgba(32,61,81,.08);}
  .wins li:last-child{border-bottom:none;}
  .wins .tick{flex:0 0 24px;height:24px;border-radius:50%;background:var(--gold);color:var(--navy);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.78rem;margin-top:1px;}

  .capture{margin:6px 0 26px;}
  /* Flodesk inline form sits here; let its own cream styling show, just center it */
  .capture [id^="fd-form-"]{max-width:760px;margin:0 auto;}
  .capture [id^="fd-form-"] h1,
  .capture [id^="fd-form-"] h2,
  .capture [id^="fd-form-"] h3,
  .capture [id^="fd-form-"] [class*="title"]{font-family:'Cormorant Garamond',serif !important;}

  .next{text-align:center;}
  .next .lbl{text-transform:uppercase;letter-spacing:.16em;font-size:.72rem;font-weight:600;color:var(--gold-deep);margin-bottom:10px;}
  .next .mtitle{font-family:'Cormorant Garamond',serif;font-size:1.5rem;color:var(--navy);line-height:1.25;margin-bottom:6px;}
  .next .msub{font-size:.92rem;color:var(--ink);margin-bottom:20px;}
  .cta{display:inline-block;background:var(--navy);color:#fff;font-weight:700;text-transform:uppercase;letter-spacing:.1em;
    font-size:.9rem;padding:16px 38px;border-radius:3px;text-decoration:none;transition:.2s;}
  .cta:hover{background:var(--navy-deep);transform:translateY(-2px);}
  .restart{display:block;background:none;border:none;margin:22px auto 0;color:var(--navy);opacity:.55;
    font-family:'Montserrat',sans-serif;font-size:.78rem;font-weight:600;letter-spacing:.05em;cursor:pointer;text-transform:uppercase;}
  .restart:hover{opacity:1;}

  .footer{text-align:center;font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--gold);
    background:var(--navy-deep);padding:16px 24px;font-size:.95rem;}

  @media(max-width:560px){
    body{padding:0;}
    .card{border-radius:0;min-height:100vh;}
    .pad{padding:32px 24px 34px;}
    .capture{padding:24px 22px 26px;}
  }
</style>
</head>
<body>
  <div class="card">
    <div class="topbar"><img src="hff-logo.png" alt="Hot, Foggy &amp; Fabulous"
      onerror="this.outerHTML='&lt;div class=\'brandmark\'&gt;Hot, Foggy &amp; &lt;b&gt;Fabulous&lt;/b&gt;&lt;/div&gt;'"></div>
    <div class="progress"><div class="bar" id="bar"></div></div>
    <div class="pad" id="stage"></div>
    <div class="footer">You are not broken. You are becoming.</div>
  </div>

<script>
/* ---------- content ---------- */
var QUESTIONS = [
  { q:"First up, have you started any treatment for this, like HRT?",
    a:["No, I'm still working out what's going on","I'm in the middle of it, trying things or talking to my GP","Yes, I've found a routine that works for me now"] },
  { q:"Your periods lately?",
    a:["Still regular, maybe a bit different","All over the place, I never know what's coming","They've stopped, or very nearly"] },
  { q:"How's your sleep?",
    a:["Mostly fine, the odd restless night","Wide awake at 3am, wired and cross","Settling now, but the last while was rough"] },
  { q:"And your brain and memory?",
    a:["The odd 'why did I come in here'","Foggy enough that it genuinely worries me","Clearer than it was, I'm finding my feet again"] },
  { q:"How about your mood?",
    a:["A slightly shorter fuse than usual","Anxious or teary out of nowhere, not like me","Steadier now, after a bumpy stretch"] },
  { q:"Your body and temperature?",
    a:["The odd unexpected warm moment","Hot flushes or night sweats, hello","Easing off, but I've well and truly been through it"] },
  { q:"How seen do you feel in all of this?",
    a:["I'm only just clocking that something's up","Honestly? Invisible. Nobody around me gets it","I'm quietly working out who I am now"] },
  { q:"Last one. What would help you most right now?",
    a:["Just understanding what on earth is happening","Practical tools to get through the hard days","Making this next chapter properly mine"] }
];

/* profile index: 0 = Just Noticing, 1 = In the Thick of It, 2 = Finding Your Ground */
var RESULTS = [
  {
    badge:"Your result: Just Noticing",
    title:"You're Just Noticing",
    lead:"Something's shifting. You're not imagining it, and you're not losing it.",
    body:"You're at the very start of the change, that bit where things feel a little off but nobody's handed you a map. Here's the good news. Knowing what's coming is the single biggest thing that takes the fear out of it. You get to walk in with your eyes open instead of being ambushed at 3am wondering what's wrong with you.",
    whats:"You're likely in early perimenopause. Hormones have started to wobble, which is why the odd symptom is creeping in even while a lot still feels normal. This can go on for years, so the earlier you understand it, the better you ride it.",
    wins:[
      "Start a simple note on your phone. Track sleep, mood and cycle for a month so you can spot your own patterns.",
      "Protect your sleep like it's your job. It's the first thing to wobble and the fastest win when you look after it.",
      "Say the word out loud to one person you trust. Naming it early takes away half its power."
    ]
  },
  {
    badge:"Your result: In the Thick of It",
    title:"You're In the Thick of It",
    lead:"This is the hardest stretch. And you are not broken. You are becoming.",
    body:"Sleep, mood, brain fog, heat, all of it turning up at once, usually when you've got the least room for it. If you've been holding it together and barely, please hear this. What you're feeling is real, it's hormonal, and it is not a character flaw. This is the messy middle, and it does get more bearable once you know what actually helps.",
    whats:"You're likely in the thick of perimenopause or menopause, where symptoms tend to peak. Your brain and body are recalibrating to a big hormonal shift. It's a lot, and it's temporary, even when it doesn't feel that way.",
    wins:[
      "Pick one symptom that's hurting most and tackle just that this week. You don't have to fix everything at once.",
      "Book the GP chat you've been putting off. Go in with your notes. You deserve real options, not being fobbed off.",
      "Lower the bar on purpose. This is a season for good enough, not for holding everyone and everything together."
    ]
  },
  {
    badge:"Your result: Finding Your Ground",
    title:"You're Finding Your Ground",
    lead:"The fog is lifting. This next chapter is yours to shape.",
    body:"You've been through the worst of it and you're coming out the other side, working out who you are now. This is the part nobody warns you can actually be the best bit. Clearer, freer, less worried about what everyone thinks. The trick now is to be a little bit selfish and build this chapter around what you actually want.",
    whats:"You're likely in menopause or post-menopause, where the sharpest symptoms ease and things start to settle. The focus shifts from surviving to deciding what you want more of, and what you're finally done with.",
    wins:[
      "Name one thing you've quietly wanted and give yourself permission to start it. This chapter is allowed to be about you.",
      "Keep moving in a way you enjoy. Strength and bones matter more now, and it holds the good mood in place.",
      "Find your people. The women a step behind you need exactly what you've just learned."
    ]
  }
];

/* ---------- state ---------- */
var answers = [];
var step = 0; // 0 = intro, 1..8 = questions, 9 = result
var stageEl = document.getElementById('stage');
var barEl = document.getElementById('bar');

function setProgress(){
  var pct = step === 0 ? 0 : Math.min(100, Math.round((answers.length / QUESTIONS.length) * 100));
  barEl.style.width = pct + "%";
}

function renderIntro(){
  step = 0; answers = []; setProgress();
  stageEl.innerHTML =
    '<div class="intro">'+
      '<div class="kicker">A 2-minute quiz for real women</div>'+
      '<h1>Is it you, or is it perimenopause?</h1>'+
      '<div class="hook">You keep wondering the same thing. Am I losing it, or is this the change?</div>'+
      '<p>Eight quick questions. No blood tests, no lectures, no jargon. Just a straight, kind read on where you are right now, and the three things that help most from here.</p>'+
      '<div class="meta">'+
        '<div><span class="dot">2</span> Takes 2 minutes</div>'+
        '<div><span class="dot">8</span> Eight easy questions</div>'+
        '<div><span class="dot">&#10003;</span> A real, personal result</div>'+
      '</div>'+
      '<a class="cta" href="#" id="startBtn">Start the quiz</a>'+
    '</div>';
  document.getElementById('startBtn').addEventListener('click', function(e){ e.preventDefault(); step=1; renderQuestion(); });
  window.scrollTo(0,0);
}

function renderQuestion(){
  var i = step - 1;
  var Q = QUESTIONS[i];
  setProgress();
  var opts = Q.a.map(function(text, idx){
    var letter = ["A","B","C"][idx];
    return '<button class="opt" data-val="'+idx+'"><span class="letter">'+letter+'</span><span>'+text+'</span></button>';
  }).join('');
  stageEl.innerHTML =
    '<div class="question">'+
      '<div class="qcount">Question '+step+' of '+QUESTIONS.length+'</div>'+
      '<div class="qtext">'+Q.q+'</div>'+
      '<div class="opts">'+opts+'</div>'+
      '<div class="navrow">'+
        '<button class="back" id="backBtn"'+(step===1?' disabled':'')+'>&larr; Back</button>'+
      '</div>'+
    '</div>';
  Array.prototype.forEach.call(document.querySelectorAll('.opt'), function(btn){
    btn.addEventListener('click', function(){
      answers[i] = parseInt(btn.getAttribute('data-val'),10);
      if(step < QUESTIONS.length){ step++; renderQuestion(); }
      else { step = 9; renderResult(); }
    });
  });
  var backBtn = document.getElementById('backBtn');
  if(backBtn){ backBtn.addEventListener('click', function(){ if(step>1){ step--; answers.pop(); renderQuestion(); } }); }
  window.scrollTo(0,0);
}

function scoreProfile(){
  var tally = [0,0,0];
  answers.forEach(function(v){ tally[v]++; });
  var best = 0;
  // tie-break toward the middle profile (index 1), the most common and safest reassurance
  if(tally[1] >= tally[0] && tally[1] >= tally[2]) best = 1;
  else if(tally[2] > tally[0] && tally[2] > tally[1]) best = 2;
  else best = 0;
  return best;
}

function renderResult(){
  setProgress();
  var idx = scoreProfile();
  var p = RESULTS[idx];
  /* Flodesk form IDs, one per result. Each form adds the subscriber to its own
     segment (Just Noticing / In the Thick of It / Finding Your Ground), which
     triggers the matching nurture workflow. No Zapier needed. */
  var formIds = ['6a533e00b7ed550c9764fef8','6a5344a873b87ca8ba6e684e','6a5344fe73a927e64254cb3a'];
  var formId = formIds[idx];
  var wins = p.wins.map(function(w){ return '<li><span class="tick">&#10003;</span><span>'+w+'</span></li>'; }).join('');
  stageEl.innerHTML =
    '<div class="result">'+
      '<span class="badge">'+p.badge+'</span>'+
      '<h2>'+p.title+'</h2>'+
      '<div class="lead">'+p.lead+'</div>'+
      '<p>'+p.body+'</p>'+
      '<div class="whats"><b>What\'s likely happening</b>'+p.whats+'</div>'+
      '<ul class="wins">'+wins+'</ul>'+

      '<div class="capture">'+
        '<div id="fd-form-'+formId+'"></div>'+
      '</div>'+

      '<div class="next">'+
        '<div class="lbl">Your next small step</div>'+
        '<div class="mtitle">Hang On...What Was I Saying? The M-word Masterclass</div>'+
        '<div class="msub">One evening. Laugh, learn, and leave feeling like yourself again. Just $37.</div>'+
        '<a class="cta" href="https://events.humanitix.com/hang-on-what-was-i-saying-the-m-word-masterclass" id="mcBtn" target="_blank" rel="noopener">Save my spot &rarr;</a>'+
      '</div>'+

      '<button class="restart" id="restartBtn">Retake the quiz</button>'+
    '</div>';

  /* Tell Flodesk to render the matching inline form into the container we just
     added. window.fd is queued by the loader in <head>, so this works even if
     the Flodesk script is still loading. On submit, the form drops the person
     into the right segment and shows its own thank-you message inline. */
  if (window.fd) { window.fd('form', { formId: formId, containerEl: '#fd-form-'+formId }); }
  document.getElementById('restartBtn').addEventListener('click', renderIntro);
  window.scrollTo(0,0);
}

renderIntro();
</script>
</body>
</html>
